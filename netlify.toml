[build]
  publish = "."

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/pera/analyze"
  to = "/.netlify/functions/pera-analyze"
  status = 200

[[redirects]]
  from = "/api/qpc/analyze"
  to = "/.netlify/functions/qpc-analyze"
  status = 200

[[redirects]]
  from = "/api/health"
  to = "/.netlify/functions/health"
  status = 200